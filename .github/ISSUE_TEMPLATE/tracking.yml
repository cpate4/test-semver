name: Roadmap Tracking
description: Link between Notion roadmap and the GitHub work that delivers it
title: "[Feature] <name matching Notion roadmap entry>"
labels: ["tracking"]
body:
  - type: input
    id: notion_url
    attributes:
      label: Notion roadmap link
      description: URL of the canonical entry in the Product Roadmap.
      placeholder: https://www.notion.so/Product-Roadmap-Backlog-22412964fe5f80129b3cfd848a4cf623/...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope summary
      description: |
        2-4 sentences. Detail lives in Notion — keep this short.<br/>
        What ships under this feature, and/or what is explicitly out of scope?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security concerns
      description: |
        Describe any security, privacy, authorization, or consent impact for the
        feature as a whole. Consider:
        - **System access**: will this feature allow new people or systems to
          access systems or data?
        - **Authorization**: will it add, remove, or modify existing access for
          people or across systems?
        - **Patient privacy / PII**: will it affect processing or storage of
          Personally Identifiable Information?
        - **Consent**: will it affect how users provide consent (authorize consent,
          accept terms and conditions, etc.)?
        - **Other**: anything else security-relevant.
        Enter `N/A` if there is no impact.
      placeholder: |
        - Will this issue change security in any way?
          Additional questions to consider include:
          - Will these changes allow new people or systems access to systems or data?
          - Will these changes change existing access for people or across systems?
            - This includes adding or removing access
        - Will this issue affect patient privacy in any way?
          Additional questions to consider include:
          - Will these changes affect any processing or storage of
            Personally Identifiable Information (PII)?
        - Will this issue affect how user's provide consent in any way?
          Some examples include (but are not limited to):
          - authorize consent,
          - accept terms and conditions,
          - other?
    validations:
      required: true
